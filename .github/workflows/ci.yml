name: CI

on:
  pull_request:
  push:
    # branches: [main] # Disable for now, manual release only
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

defaults:
  run:
    shell: bash

jobs:
  # Setup job to generate the poetry.lock file and upload it as an artifact
  setup:
    runs-on: public-actions-runner-scale-set
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Ensure Poetry and uv are on PATH
        run: echo "/home/runner/.local/bin" >> "$GITHUB_PATH"
      - name: Verify runner Python and Poetry toolchain
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          python3.12 --version
          poetry --version
          uv --version
      # Generate poetry.lock file for the CI and upload it as an artifact
      - name: Setup a local virtual environment (if no poetry.toml file)
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local
          poetry lock
      - name: Upload poetry.lock
        uses: actions/upload-artifact@v7.0.0
        with:
          name: poetry-lock
          path: poetry.lock
      # Define a cache for the virtual environment based on the dependencies lock file
      # This will speed up the CI by avoiding to reinstall the dependencies if they are already installed
      - uses: actions/cache@v5.0.3
        name: Define a cache for the virtual environment based on the dependencies lock file
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-
      - name: Install the project dependencies
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry install --with test
  create-sbom:
    needs: setup
    runs-on: public-actions-runner-scale-set
    permissions:
      contents: write
      packages: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Download poetry.lock
        uses: actions/download-artifact@v8.0.1
        with:
          name: poetry-lock
      - uses: anchore/sbom-action@v0.23.1
        id: sbom
        with:
          file: ./poetry.lock
          dependency-snapshot: true
          upload-artifact: true
          upload-artifact-retention: 1
          upload-release-assets: true
          format: "spdx-json"
          artifact-name: "${{ github.event.repository.name }}-sbom.spdx.json"
  dependency-scan-grype:
    needs:
      - setup
      - create-sbom
    runs-on: public-actions-runner-scale-set
    permissions:
      contents: write
      actions: read
      packages: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Download SBOM
        uses: actions/download-artifact@v8.0.1
        with:
          name: "${{ github.event.repository.name }}-sbom.spdx.json"
      - name: Scan current project
        id: scan
        uses: anchore/scan-action@v7.3.2
        with:
          cache-db: true
          sbom: "${{ github.event.repository.name }}-sbom.spdx.json"
          output-format: table
          output-file: "${{ github.event.repository.name }}-grype-scan.txt"
      - name: Upload Report
        uses: actions/upload-artifact@v7.0.0
        with:
          name: "${{ github.event.repository.name }}-grype-scan.txt"
          path: "${{ github.event.repository.name }}-grype-scan.txt"
  pre-commit:
    needs: setup
    runs-on: public-actions-runner-scale-set
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Ensure Poetry and uv are on PATH
        run: echo "/home/runner/.local/bin" >> "$GITHUB_PATH"
      - name: Verify runner Python and Poetry toolchain
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          python3.12 --version
          poetry --version
          uv --version
      - name: Download poetry.lock
        uses: actions/download-artifact@v8.0.1
        with:
          name: poetry-lock
      - name: Restore Cache
        uses: actions/cache/restore@v5.0.3
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-
      - uses: actions/cache@v5.0.3
        name: Restore virtualenv
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-
      - name: Setup a local virtual environment
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local
      - name: Install the project dependencies
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry install --with test
      - name: Run pre-commit (formatting, linting, type checking and tests)
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          export PYTHONPATH=./src:./tests:$PYTHONPATH
          poetry run pre-commit run --all-files
  release:
    needs:
      - setup
      - pre-commit
      - dependency-scan-grype
    runs-on: public-actions-runner-scale-set
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write # for the pypi
      contents: write # for the release
      packages: write
      discussions: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Ensure Poetry and uv are on PATH
        run: echo "/home/runner/.local/bin" >> "$GITHUB_PATH"
      - name: Download poetry.lock
        uses: actions/download-artifact@v8.0.1
        with:
          name: poetry-lock
      - name: Download SBOM
        uses: actions/download-artifact@v8.0.1
        with:
          name: "${{ github.event.repository.name }}-sbom.spdx.json"
      - name: Download Grype Scan
        uses: actions/download-artifact@v8.0.1
        with:
          name: "${{ github.event.repository.name }}-grype-scan.txt"
      - name: Verify runner Python and Poetry toolchain
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          python3.12 --version
          poetry --version
          uv --version
      - name: Setup a local virtual environment
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local
      - name: Build package distributions
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          poetry self add poetry-dynamic-versioning
          poetry build
      - name: Extract changelog for release
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          VERSION="${GITHUB_REF_NAME#v}"

          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "No release notes found for ## [$VERSION] in CHANGELOG.md"
            exit 1
          fi

          echo "Extracted release notes for v$VERSION:"
          cat release_notes.txt
      - name: Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          body_path: release_notes.txt
          files: |
            dist/fastapi_factory_utilities-*.tar.gz
            dist/fastapi_factory_utilities-*.whl
            poetry.lock
            ${{ github.event.repository.name }}-sbom.spdx.json
            ${{ github.event.repository.name }}-grype-scan.txt
          tag_name: ${{ github.ref }}
          name: ${{ github.ref_name }}
          prerelease: false
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
